name: Playwright E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout terroir-ma-web
        uses: actions/checkout@v4
        with:
          path: terroir-ma-web

      - name: Checkout terroir-ma (backend)
        uses: actions/checkout@v4
        with:
          repository: rhorba/terroir-ma
          path: terroir-ma

      - name: Start backend test stack
        working-directory: terroir-ma/infrastructure/docker
        run: docker compose -f docker-compose.test.yml up -d --wait
        env:
          COMPOSE_FILE: docker-compose.test.yml

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: terroir-ma-web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: terroir-ma-web
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: terroir-ma-web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright E2E
        working-directory: terroir-ma-web
        run: pnpm test:e2e
        env:
          AUTH_SECRET: ci-test-secret-min-32-characters-long
          NEXTAUTH_URL: http://localhost:3001
          KEYCLOAK_CLIENT_ID: terroir-portal
          KEYCLOAK_CLIENT_SECRET: terroir-portal-secret
          KEYCLOAK_ISSUER: http://localhost:8444/realms/terroir-ma
          NEXT_PUBLIC_API_URL: http://localhost:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: terroir-ma-web/playwright-report/
          retention-days: 7
